<!DOCTYPE html>
<html lang="tr" style="--primary-color:#5145CC !important">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="icon" href="<%= BASE_URL %>favicon-<%= VUE_APP_ENV %>.ico">
    <title>Nebula - Çağrı ve Müşteri Yönetim Sistemi</title>
<!--    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap&subset=latin-ext" rel="stylesheet">-->
    <link href="https://fonts.googleapis.com/css?family=Poppins:300,400,500,600,700&display=swap&subset=latin-ext" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Source+Code+Pro:300,400,500,600,700&display=swap&subset=latin-ext" rel="stylesheet">
    <link rel="stylesheet" href="<%= BASE_URL %>assets/css/site.min.css?v=3.0.59" type="text/css">
    <link rel="stylesheet" href="<%= BASE_URL %>assets/css/element.css?v=3.0.59" type="text/css">
    <link rel="stylesheet" href="<%= BASE_URL %>assets/css/app.css?v=3.0.59" type="text/css">
    <link rel="stylesheet" href="<%= BASE_URL %>assets/css/element-dark.css?v=3.0.59" type="text/css" id="dark" disabled="true">
    <link rel="stylesheet" href="<%= BASE_URL %>assets/css/responsive.css?v=3.0.59" type="text/css">
    <meta name="robots" content="noindex">
    <meta name="googlebot" content="noindex">
    <script type="module" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule="" src="https://unpkg.com/ionicons@5.4.0/dist/ionicons/ionicons.js"></script>
    <style>
        h1, h2, h3, h4, h5, h6, span, div, p, b, strong, a {
            font-family: 'Poppins', sans-serif !important;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 0;
        }

        ::-webkit-scrollbar :hover {
            width: 10px;
        }

        ::-webkit-scrollbar:hover {
            height: 18px;
        }

        ::-webkit-scrollbar-button:start:decrement,
        ::-webkit-scrollbar-button:end:increment {
            height: 0px;
            width: 0px;
            display: block;
            background: transparent;
        }

        ::-webkit-scrollbar-button:horizontal:decrement {
            background-position: 4px 3px;
        }

        ::-webkit-scrollbar-button:horizontal:increment {
            background-position: 3px 3px;
        }

        ::-webkit-scrollbar-button:vertical:decrement {
            background-position: 3px 4px;
        }

        ::-webkit-scrollbar-track-piece {
            background: none;
        }

        ::-webkit-scrollbar-thumb:vertical {
            height: 50px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            border: 0px solid transparent;
            border-top: 0px solid transparent;
            border-left: 0px solid transparent;
        }


        ::-webkit-scrollbar-thumb:horizontal {
            width: 50px;
            height: 100px;
            background: rgba(0, 0, 0, 0.4);
            border: 0px solid transparent;
            border-top: 0px solid transparent;
            border-left: 0px solid transparent;
            border-radius: 5px;
        }
    </style>
    <script>

    </script>
</head>
<body>
<noscript>
    <strong>We're sorry but <%= htmlWebpackPlugin.options.title %> doesn't work properly without JavaScript enabled.
        Please enable it to continue.</strong>
</noscript>
<div id="app"></div>
<!-- built files will be auto injected -->
<!--<script src="<%= BASE_URL %>assets/js/site.min.js" type="text/javascript"></script>-->
</body>
</html>
